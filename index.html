<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Annick &amp; Damien's Wedding</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f8f6f2;
    padding: 30px;
    margin: 0;
}

.container{
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,.1);
    text-align: center;
}

h1{
    color: #9b6433;
}

button{
    background: #9b6433;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:disabled {
    background: #cccccc;
    cursor: not-allowed;
}

#status{
    margin-top: 20px;
    text-align: left;
    white-space: pre-wrap;
    font-family: monospace;
}
</style>
</head>

<body>

<div class="container">

<h1>Annick &amp; Damien's Wedding</h1>

<p>
Thank you for celebrating with us.<br>
Please upload any photos or videos from our special day.
</p>

<input id="photos" type="file" multiple accept="image/*,video/*">

<br><br>

<button id="uploadBtn" onclick="uploadPhotos()">
Upload Photos
</button>

<div id="status"></div>

</div>

<script>
async function uploadPhotos() {
    const fileInput = document.getElementById("photos");
    const files = fileInput.files;
    const btn = document.getElementById("uploadBtn");

    if (files.length === 0) {
        alert("Please choose at least one file.");
        return;
    }

    // Disable button and give immediate feedback
    btn.disabled = true;
    btn.innerText = "Uploading...";
    document.getElementById("status").innerText = "Uploading your memories, please wait...";

    let output = "";

    for (const file of files) {
        const formData = new FormData();
        formData.append("file", file);

        try {
            const response = await fetch(
                "https://ancient-dew-e0ea.jkdunbar.workers.dev/upload",
                {
                    method: "POST",
                    body: formData
                }
            );

            const text = await response.text();

            output +=
                "FILE: " + file.name + "\n" +
                "STATUS: " + response.status + "\n" +
                "RESPONSE: " + text + "\n\n";

        } catch (err) {
            output +=
                "FILE: " + file.name + "\n" +
                "ERROR: " + err.message + "\n\n";
        }
    }

    // Output final status, reset button, and clear file input
    document.getElementById("status").innerText = output;
    btn.disabled = false;
    btn.innerText = "Upload Photos";
    fileInput.value = ""; 
}
</script>

</body>
</html>
