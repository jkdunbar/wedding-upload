<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mariage d'Annick et Damien</title>

<style>

body{
    font-family: Arial, sans-serif;

    background-image:
        url("https://lh3.googleusercontent.com/pw/AP1GczM7Vis5mcdviX0334R0lKOI2KNLReNWZqgQQXKKvgUcYpG9iH2W0h5I2i4GwZFwSJkkACzRNykQ9tZpTRPkJp960zBH01Pi9AtFFQJZkXdmD5NGNCf7=w2400");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    padding: 30px;
    margin: 0;
}

.container{
    max-width: 800px;
    margin: auto;

    background: rgba(255,255,255,0.92);

    padding: 40px;

    border-radius: 20px;

    box-shadow: 0 4px 15px rgba(0,0,0,.15);

    text-align: center;
}

h1{
    color: #9b6433;
    margin-bottom: 10px;

    font-family: Georgia, serif;

    font-size: 3rem;

    font-weight: normal;
}

.date{
    font-style: italic;
    color: #8c6d48;
    margin-bottom: 25px;
    font-size: 1.2rem;
}

p{
    font-size: 20px;
    line-height: 1.6;
    color: #444;
}

input[type="file"]{
    margin: 20px 0;
}

button{
    background: #9b6433;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 16px;
}

button:hover{
    background: #7f4f26;
}

#status{
    margin-top: 25px;
    color: #9b6433;
    font-size: 18px;
    font-weight: bold;
}

#count{
    margin-top: 10px;
    color: #666;
}

.gallery-link{
    display:block;
    margin-top:25px;
    font-size:18px;
    color:#9b6433;
    text-decoration:none;
    font-weight:bold;
}

.gallery-link:hover{
    text-decoration:underline;
}

.footer{
    margin-top:30px;
    color:#777;
    font-size:14px;
}

@media (max-width:600px){

    body{
        padding:15px;
    }

    .container{
        padding:25px;
    }

    h1{
        font-size:2.2rem;
    }

    p{
        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>Annick et Damien</h1>

    <div class="date">
        9 août 2026
    </div>

    <p>
        Merci de célébrer cette journée spéciale avec nous.<br>
        Veuillez partager vos photos et vidéos du mariage.
    </p>

    <input
        id="photos"
        type="file"
        multiple
        accept="image/*,video/*"
    >

    <div id="count"></div>

    <br>

    <button onclick="uploadPhotos()">
        Téléverser les photos
    </button>

    <div id="status"></div>

    gallery.html
        Voir la galerie
    </a>

    <div class="footer">
        Merci de partager vos souvenirs avec nous ❤️
    </div>

</div>

<script>

document.getElementById("photos").addEventListener("change", function() {

    const files = document.getElementById("photos").files;

    document.getElementById("count").innerText =
        files.length + " fichier(s) sélectionné(s)";
});

async function uploadPhotos() {

    const files = document.getElementById("photos").files;

    if (files.length === 0) {
        alert("Veuillez sélectionner au moins une photo ou une vidéo.");
        return;
    }

    const status = document.getElementById("status");

    let uploaded = 0;

    for (const file of files) {

        status.innerText =
            "Téléversement " +
            (uploaded + 1) +
            " sur " +
            files.length +
            "...";

        const formData = new FormData();
        formData.append("file", file);

        try {

            const response = await fetch(
                "https://ancient-dew-e0ea.jkdunbar.workers.dev/upload",
                {
                    method: "POST",
                    body: formData
                }
            );

            if (response.ok) {
                uploaded++;
            }

        } catch (err) {
            console.error(err);
        }
    }

    if (uploaded === files.length) {

        status.innerHTML =
            "Merci d'avoir partagé vos souvenirs !<br><br>" +
            uploaded +
            " fichier(s) téléversé(s) avec succès.";

        document.getElementById("photos").value = "";
        document.getElementById("count").innerText = "";

    } else {

        status.innerHTML =
            uploaded +
            " fichier(s) téléversé(s) sur " +
            files.length + ".";
    }
}

</script>

</body>
</html>
