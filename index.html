<body>

<div class="container">

    <h1>Annick et Damien</h1>

    <div class="subtitle">
        Notre mariage
    </div>

    <div class="message">
        Merci de célébrer cette journée spéciale avec nous.<br><br>
        Veuillez partager vos photos et vidéos afin que nous puissions profiter de tous les moments de cette magnifique journée.
    </div>

    <input
        id="photos"
        type="file"
        multiple
        accept="image/*,video/*"
    >

    <div id="count"></div>

    <button onclick="uploadPhotos()">
        Téléverser les souvenirs
    </button>

    <div id="status"></div>

    gallery.html

    <div class="footer">
        Merci de partager vos souvenirs avec nous ❤️
    </div>

</div>

<script>

document.getElementById("photos")
.addEventListener("change", function(){

    const files =
        document.getElementById("photos").files;

    document.getElementById("count").innerText =
        files.length + " fichier(s) sélectionné(s)";
});

async function uploadPhotos(){

    const files =
        document.getElementById("photos").files;

    if(files.length === 0){

        alert(
            "Veuillez sélectionner au moins une photo ou une vidéo."
        );

        return;
    }

    const status =
        document.getElementById("status");

    let uploaded = 0;

    for(const file of files){

        status.innerText =
            "Téléversement " +
            (uploaded + 1) +
            " sur " +
            files.length +
            "...";

        const formData = new FormData();

        formData.append("file", file);

        try{

            const response = await fetch(
                "https://ancient-dew-e0ea.jkdunbar.workers.dev/upload",
                {
                    method:"POST",
                    body:formData
                }
            );

            if(response.ok){
                uploaded++;
            }

        }catch(err){

            console.error(err);
        }
    }

    status.innerHTML =
        "Merci !<br><br>" +
        uploaded +
        " fichier(s) téléversé(s) avec succès.";

    document.getElementById("photos").value = "";
    document.getElementById("count").innerText = "";
}

</script>

</body>
