<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mariage d'Annick et Damien</title>

<style>

body{
    font-family: Arial, sans-serif;

    background:
        linear-gradient(
            rgba(255,255,255,0.35),
            rgba(255,255,255,0.35)
        ),
        url("https://lh3.googleusercontent.com/pw/AP1GczM7Vis5mcdviX0334R0lKOI2KNLReNWZqgQQXKKvgUcYpG9iH2W0h5I2i4GwZFwSJkkACzRNykQ9tZpTRPkJp960zBH01Pi9AtFFQJZkXdmD5NGNCf7=w2400");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    padding: 30px;
    margin: 0;
}

.container{
    max-width: 800px;
    margin: auto;

    background: rgba(255,255,255,0.92);

    backdrop-filter: blur(4px);

    padding: 40px;

    border-radius: 20px;

    box-shadow: 0 4px 15px rgba(0,0,0,.15);

    text-align: center;
}

h1{
    color: #9b6433;
    margin-bottom: 20px;

    font-family: Georgia, serif;

    font-size: 3rem;
}

p{
    font-size: 18px;
    line-height: 1.6;
}

input[type="file"]{
    margin: 20px 0;
}

button{
    background: #9b6433;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}
