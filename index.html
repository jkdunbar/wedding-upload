<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin &amp; Damien's Wedding</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f8f6f2;
        text-align: center;
        margin: 0;
        padding: 20px;
        color: #333;
    }

    .container {
        max-width: 600px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
        color: #8b5e3c;
        margin-bottom: 10px;
    }

    p {
        line-height: 1.5;
    }

    input[type=file] {
        width: 100%;
        margin: 20px 0;
    }

    button {
        background: #8b5e3c;
        color: white;
        border: none;
        padding: 14px 24px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #6e492e;
    }

    #count {
        margin-top: 10px;
        color: #666;
    }

    #status {
        margin-top: 20px;
        font-weight: bold;
        white-space: pre-line;
    }
</style>
