<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mariage d'Annick et Damien</title>

<style>

body{
    font-family: Arial, sans-serif;

    background-image:
        url("https://lh3.googleusercontent.com/pw/AP1GczM7Vis5mcdviX0334R0lKOI2KNLReNWZqgQQXKKvgUcYpG9iH2W0h5I2i4GwZFwSJkkACzRNykQ9tZpTRPkJp960zBH01Pi9AtFFQJZkXdmD5NGNCf7=w2400");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    padding: 30px;
    margin: 0;
}

.container{
    max-width: 800px;
    margin: auto;

    background: rgba(255,255,255,0.95);

    padding: 40px;

    border-radius: 20px;

    box-shadow: 0 4px 15px rgba(0,0,0,.10);

    text-align: center;
}

h1{
    color: #A56B38;
    font-size: 48px;
    margin-bottom: 10px;
    font-family: Georgia, serif;
}

.date{
    font-style: italic;
    color: #8f755a;
    margin-bottom: 30px;
    font-size: 20px;
}

.message{
    font-size: 20px;
    line-height: 1.6;
    color: #444;
    margin-bottom: 30px;
}

input[type="file"]{
    margin: 20px 0;
}

button{
    background: #B07A45;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 16px;
}

button:hover{
    background: #976336;
}

#status{
    margin-top: 25px;
    color: #A56B38;
    font-size: 18px;
    font-weight: bold;
}

#count{
    margin-top: 10px;
    color: #666;
}

.gallery-link{
    display:block;
    margin-top:25px;
    color:#A56B38;
    text-decoration:none;
    font-weight:bold;
    font-size:18px;
}

.gallery-link:hover{
    text-decoration:underline;
}

.footer{
    margin-top:30px;
    color:#666;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

    <h1>Annick et Damien</h1>

    <div class="date">
        9 août 2026
    </div>

    <div class="message">
        Merci de célébrer cette journée spéciale avec nous.<br><br>
        Veuillez partager vos photos et vidéos du mariage.
    </div>

    <input
        id="photos"
        type="file"
        multiple
        accept="image/*,video/*"
    >

    <div id="count"></div>

    <br>

    <button onclick="uploadPhotos()">
        Téléverser les photos
    </button>

    <div id="status"></div>

    gallery.html
        Voir la galerie
    </a>

    <div class="footer">
        Merci de partager vos souvenirs avec nous ❤️
    </div>

</div>

<script>

document.getElementById("photos").addEventListener("change", function() {

    const files = document.getElementById("photos").files;

    document.getElementById("count").innerText =
        files.length + " fichier(s) sélectionné(s)";
});

async function uploadPhotos() {

    const files = document.getElementById("photos").files;

    if (files.length === 0) {
        alert("Veuillez sélectionner au moins une photo ou une vidéo.");
        return;
    }

    const status = document.getElementById("status");

    let uploaded = 0;

    for (const file of files) {

        status.innerText =
            "Téléversement " +
            (uploaded + 1) +
            " sur " +
            files.length +
            "...";

        const formData = new FormData();
        formData.append("file", file);

        try {

            const response = await fetch(
                "https://ancient-dew-e0ea.jkdunbar.workers.dev/upload",
                {
                    method: "POST",
                    body: formData
                }
            );

            if (response.ok) {
                uploaded++;
            }

        } catch (err) {
            console.error(err);
        }
    }

    status.innerHTML =
        "Merci !<br><br>" +
        uploaded +
        " fichier(s) téléversé(s) avec succès.";

    document.getElementById("photos").value = "";
    document.getElementById("count").innerText = "";
}

</script>

</body>
</html>
