<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Le Mariage d'Annick & Damien</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>

<style>
body {
    font-family: 'Montserrat', sans-serif;
    background: url('https://lh3.googleusercontent.com/pw/AP1GczM7Vis5mcdviX0334R0lKOI2KNLReNWZqgQQXKKvgUcYpG9iH2W0h5I2i4GwZFwSJkkACzRNykQ9tZpTRPkJp960zBH01Pi9AtFFQJZkXdmD5NGNCf7=w2400') no-repeat center center fixed;
    background-size: cover;
    padding: 60px 20px;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
}

.container {
    max-width: 650px;
    width: 100%;
    margin: auto;
    background: rgba(255, 255, 255, 0.92);
    padding: 50px 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.5);
}

h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 400;
    color: #845422;
    margin-bottom: 5px;
    letter-spacing: 1px;
}

.wedding-date {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #a37c54;
    font-size: 1.2rem;
    margin-top: 0;
    margin-bottom: 30px;
}

p {
    color: #555555;
    font-size: 0.95rem;
    line-height: 1.8;
    margin-bottom: 30px;
    letter-spacing: 0.5px;
}

input[type="file"] {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.9rem;
    color: #777;
    background: #faf8f5;
    padding: 12px 20px;
    border-radius: 6px;
    border: 1px dashed #d1c4b6;
    cursor: pointer;
    width: 80%;
    max-width: 350px;
    box-sizing: border-box;
    transition: all 0.3s ease;
}

input[type="file"]:hover {
    border-color: #845422;
    background: #fdfcfb;
}

.button-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    margin-top: 25px;
}

button, .btn-secondary {
    font-family: 'Montserrat', sans-serif;
    padding: 14px 40px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    box-sizing: border-box;
    width: 100%;
    max-width: 320px;
    text-decoration: none;
    display: inline-block;
}

button {
    background: #845422;
    color: white;
    border: none;
    box-shadow: 0 4px 10px rgba(132, 84, 34, 0.2);
}

button:hover {
    background: #6e441a;
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(132, 84, 34, 0.3);
}

button:disabled {
    background: #cccccc;
    box-shadow: none;
    transform: none;
    cursor: not-allowed;
}

.btn-secondary {
    background: transparent;
    color: #845422;
    border: 1px solid #845422;
}

.btn-secondary:hover {
    background: #845422;
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(132, 84, 34, 0.15);
}

.status-message {
    margin-top: 25px;
    font-size: 0.95rem;
    font-weight: 400;
    padding: 12px;
    border-radius: 8px;
    display: none;
    animation: fadeIn 0.4s ease;
}

.status-loading {
    color: #a37c54;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.2rem;
}

.status-success {
    background: #f0f7f4;
    color: #2e6f40;
    border: 1px solid #d2e7de;
}

.status-error {
    background: #fdf2f2;
    color: #ae2b2b;
    border: 1px solid #fae1e1;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">

<h1>Annick & Damien</h1>
<div class="wedding-date">Notre Grand Jour</div>

<p>
    Un grand merci d'avoir partagé ces moments avec nous.<br>
    Vous pouvez utiliser le bouton ci-dessous pour nous envoyer les photos (.jpg, .png, .heic) et vidéos (.mp4, .mov) de notre mariage.
</p>

<input id="photos" type="file" multiple accept="image/*,video/*,.heic,.HEIC,.mov,.MOV">

<div class="button-group">
    <button id="uploadBtn" onclick="uploadPhotos()">
        Envoyer nos souvenirs
    </button>
    
    <a href="https://wedding-upload.jkdunbar.workers.dev/gallery" class="btn-secondary">
        Voir la galerie
    </a>
</div>

<div id="statusLoading" class="status-message status-loading"></div>
<div id="statusSuccess" class="status-message status-success"></div>
<div id="statusError" class="status-message status-error"></div>

</div>

<script>
function createThumbnail(file, maxWidth = 300) {
    return new Promise((resolve) => {
        if (file.name.toLowerCase().endsWith('.heic') || !file.type.startsWith('image/')) {
            resolve(null);
            return;
        }

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                } else {
                    if (height > maxWidth) {
                        width = Math.round((width * maxWidth) / height);
                        height = maxWidth;
                    }
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/jpeg', 0.7);
            };
        };
    });
}

async function uploadPhotos() {
    const fileInput = document.getElementById("photos");
    const files = fileInput.files;
    const btn = document.getElementById("uploadBtn");
    
    const sLoading = document.getElementById("statusLoading");
    const sSuccess = document.getElementById("statusSuccess");
    const sError = document.getElementById("statusError");

    if (files.length === 0) {
        alert("Veuillez sélectionner au moins un fichier.");
        return;
    }

    sSuccess.style.display = "none";
    sError.style.display = "none";
    
    btn.disabled = true;
    btn.innerText = "Envoi en cours...";
    sLoading.innerText = `Envoi de vos précieux souvenirs (${files.length} fichiers)...`;
    sLoading.style.display = "block";

    let detailedError = "";

    for (let file of files) {
        let isHeic = file.name.toLowerCase().endsWith('.heic');
        
        if (isHeic) {
            if (typeof heic2any !== 'function') {
                detailedError = "La librairie heic2any n'a pas pu être chargée par le navigateur.";
                break;
            }
            try {
                sLoading.innerText = `Conversion de l'image Apple HEIC (${file.name})...`;
                const convertedBlob = await heic2any({
                    blob: file,
                    toType: "image/jpeg",
                    quality: 0.80
                });
                
                const newName = file.name.replace(/\.[^/.]+$/, "") + ".jpg";
                file = new File([convertedBlob], newName, { type: "image/jpeg" });
            } catch (heicErr) {
                detailedError = `Échec de la conversion HEIC: ${heicErr.message || heicErr}`;
                break;
            }
        }

        sLoading.innerText = `Envoi de ${file.name}...`;

        const formData = new FormData();
        formData.append("file", file);

        const thumbBlob = await createThumbnail(file);
        if (thumbBlob) {
            formData.append("thumbnail", thumbBlob, "thumb_" + file.name);
        }

        try {
            const response = await fetch(
                "https://ancient-dew-e0ea.jkdunbar.workers.dev/upload",
                {
                    method: "POST",
                    body: formData
                }
            );

            if (!response.ok) {
                const errMsg = await response.text();
                throw new Error(`Erreur serveur (${response.status}): ${errMsg}`);
            }

        } catch (err) {
            detailedError = `Échec de l'envoi pour ${file.name}: ${err.message}`;
            break;
        }
    }

    sLoading.style.display = "none";
    btn.disabled = false;
    btn.innerText = "Envoyer nos souvenirs";

    if (!detailedError) {
        sSuccess.innerText = "✨ Vos magnifiques photos ont bien été ajoutées à la galerie. Merci beaucoup !";
        sSuccess.style.display = "block";
        fileInput.value = ""; 
    } else {
        sError.innerText = `⚠️ ${detailedError}`;
        sError.style.display = "block";
    }
}
</script>

</body>
</html>
