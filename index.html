<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annick &amp; Damien's Wedding</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f8f6f2;
        text-align: center;
        margin: 0;
        padding: 20px;
        color: #333;
    }

    .container {
        max-width: 600px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
        color: #8b5e3c;
        margin-bottom: 10px;
    }

    p {
        margin-bottom: 20px;
        line-height: 1.5;
    }

    input[type=file] {
        margin: 20px 0;
        width: 100%;
    }

    button {
        background: #8b5e3c;
        color: white;
        border: none;
        padding: 14px 24px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #6e492e;
    }

    #count {
        margin-top: 10px;
        color: #666;
    }

    #status {
        margin-top: 20px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="container">

    <h1>Annick &amp; Damien's Wedding</h1>

    <p>
        Thank you for celebrating with us.<br>
        Please upload any photos or videos from our special day.
    </p>

    <input
        id="photos"
        type="file"
        multiple
        accept="image/*,video/*"
    >

    <div id="count"></div>

    <button onclick="uploadPhotos()">
        Upload Photos
    </button>

    <div id="status"></div>

</div>

<script>
document.getElementById("photos").addEventListener("change", () => {
    const files = document.getElementById("photos").files;

    document.getElementById("count").innerText =
        files.length + " file(s) selected";
});

async function uploadPhotos() {

    const files =
        document.getElementById("photos").files;

    if (files.length === 0) {
        alert("Please select photos or videos.");
        return;
    }

    const status =
        document.getElementById("status");

    status.innerText = "Uploading...";

    let uploaded = 0;

    for (const file of files) {

        const formData = new FormData();
        formData.append("file", file);

        try {
            const response = await fetch("/upload", {
                method: "POST",
                body: formData
            });

            if (response.ok) {
                uploaded++;
            }
        } catch (error) {
            console.error(error);
        }
    }

    status.innerText =
        "Thank you! " +
        uploaded +
        " file(s) uploaded successfully.";

    document.getElementById("photos").value = "";
    document.getElementById("count").innerText = "";
}
</script>

</body>
</html>
