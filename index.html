<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mariage d'Annick et Damien</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f8f6f2;
    padding: 30px;
    margin: 0;
}

.container{
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,.1);
    text-align: center;
}

h1{
    color: #9b6433;
    margin-bottom: 20px;
}

p{
    font-size: 18px;
    line-height: 1.5;
}

input[type="file"]{
    margin: 20px 0;
}

button{
    background: #9b6433;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover{
    background: #7f4f26;
}

#status{
    margin-top: 25px;
    color: #9b6433;
    font-size: 18px;
    font-weight: bold;
}

#count{
    margin-top: 10px;
    color: #666;
}
</style>
</head>

<body>

<div class="container">

    <h1>Mariage d'Annick et Damien</h1>

    <p>
        Merci de célébrer cette journée spéciale avec nous.<br>
        Veuillez partager vos photos et vidéos du mariage.
    </p>

    <input
        id="photos"
        type="file"
        multiple
        accept="image/*,video/*"
    >

    <div id="count"></div>

    <br>

    <button onclick="uploadPhotos()">
        Téléverser les photos
    </button>

    <div id="status"></div>

</div>

<script>

document.getElementById("photos").addEventListener("change", function() {

    const files = document.getElementById("photos").files;

    document.getElementById("count").innerText =
        files.length + " fichier(s) sélectionné(s)";
});

async function uploadPhotos() {

    const files = document.getElementById("photos").files;

    if (files.length === 0) {
        alert("Veuillez sélectionner au moins une photo ou une vidéo.");
        return;
    }

    const status = document.getElementById("status");

    let uploaded = 0;

    for (const file of files) {

        status.innerText =
            "Téléversement " +
            (uploaded + 1) +
            " sur " +
            files.length +
            "...";

        const formData = new FormData();
        formData.append("file", file);

        try {

            const response = await fetch(
                "https://ancient-dew-e0ea.jkdunbar.workers.dev/upload",
                {
                    method: "POST",
                    body: formData
                }
            );

            if (response.ok) {
                uploaded++;
            }

        } catch (err) {
            console.error(err);
        }
    }

    if (uploaded === files.length) {

        status.innerHTML =
            "Merci d'avoir partagé vos souvenirs&nbsp;!<br><br>" +
            uploaded +
            " fichier(s) téléversé(s) avec succès.";

        document.getElementById("photos").value = "";
        document.getElementById("count").innerText = "";

    } else {

        status.innerHTML =
            uploaded +
            " fichier(s) téléversé(s) sur " +
            files.length + ".";
    }
}

</script>

</body>
</html>
