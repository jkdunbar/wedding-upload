<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mariage d'Annick et Damien</title>

<style>

body{
    font-family: "Segoe UI", Arial, sans-serif;

    background:
        linear-gradient(
            rgba(255,255,255,0.30),
            rgba(255,255,255,0.30)
        ),
        url("https://lh3.googleusercontent.com/pw/AP1GczM7Vis5mcdviX0334R0lKOI2KNLReNWZqgQQXKKvgUcYpG9iH2W0h5I2i4GwZFwSJkkACzRNykQ9tZpTRPkJp960zBH01Pi9AtFFQJZkXdmD5NGNCf7=w2400");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    margin: 0;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 20px;
}

.container{

    width: 100%;
    max-width: 650px;

    background: rgba(255,255,255,0.93);

    border: 1px solid rgba(176,122,69,.2);

    border-radius: 24px;

    padding: 50px 40px;

    text-align: center;

    box-shadow:
        0 10px 40px rgba(0,0,0,.15);
}

h1{

    margin: 0;

    font-family: Georgia, serif;

    font-size: 3.4rem;

    font-weight: normal;

    color: #A56B38;

    line-height: 1.1;
}

.date{

    margin-top: 10px;

    font-size: 1.2rem;

    font-style: italic;

    color: #9b7a57;

    margin-bottom: 35px;
}

.message{

    font-size: 1.2rem;

    line-height: 1.8;

    color: #555;

    max-width: 500px;

    margin: 0 auto 35px auto;
}

input[type=file]{

    width: 100%;

    margin: 20px 0;
}

button{

    background: #B07A45;

    color: white;

    border: none;

    border-radius: 30px;

    padding: 16px 45px;

    font-size: 18px;

    cursor: pointer;

    transition: .2s;
}

button:hover{

    background: #986437;

    transform: translateY(-2px);
}

#count{

    margin-bottom: 20px;

    color: #777;
}

#status{

    margin-top: 25px;

    color: #A56B38;

    font-size: 18px;

    font-weight: bold;
}
