<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Le Mariage d'Annick &amp; Damien</title>

<!-- Elegant Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Montserrat', sans-serif;
    background: url('https://lh3.googleusercontent.com/pw/AP1GczM7Vis5mcdviX0334R0lKOI2KNLReNWZqgQQXKKvgUcYpG9iH2W0h5I2i4GwZFwSJkkACzRNykQ9tZpTRPkJp960zBH01Pi9AtFFQJZkXdmD5NGNCf7=w2400') no-repeat center center fixed;
    background-size: cover;
    padding: 60px 20px;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
}

.container {
    max-width: 650px;
    width: 100%;
    margin: auto;
    background: rgba(255, 255, 255, 0.92);
    padding: 50px 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.5);
}

h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 400;
    color: #845422;
    margin-bottom: 5px;
    letter-spacing: 1px;
}

.wedding-date {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #a37c54;
    font-size: 1.2rem;
    margin-top: 0;
    margin-bottom: 30px;
}

p {
    color: #555555;
    font-size: 0.95rem;
    line-height: 1.8;
    margin-bottom: 30px;
    letter-spacing: 0.5px;
}

input[type="file"] {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.9rem;
    color: #777;
    background: #faf8f5;
    padding: 12px 20px;
    border-radius: 6px;
    border: 1px dashed #d1c4b6;
    cursor: pointer;
    width: 80%;
    max-width: 350px;
    box-sizing: border-box;
    transition: all 0.3s ease;
}

input[type="file"]:hover {
    border-color: #845422;
    background: #fdfcfb;
}

.button-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    margin-top: 25px;
}

button, .btn-secondary {
    font-family: 'Montserrat', sans-serif;
    padding: 14px 40px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    box-sizing: border-box;
    width: 100%;
    max-width: 320px;
    text-decoration: none;
    display: inline-block;
}

/* Primary Upload Button Styles */
button {
    background: #845422;
    color: white;
    border: none;
    box-shadow: 0 4px 10px rgba(132, 84, 34, 0.2);
}

button:hover {
    background: #6e441a;
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(132, 84, 34, 0.3);
}

button:disabled {
    background: #cccccc;
    box-shadow: none;
    transform: none;
    cursor: not-allowed;
}

/* Secondary Gallery Link Styles */
.btn-secondary {
    background: transparent;
    color: #845422;
    border: 1px solid #845422;
}

.btn-secondary:hover {
    background: #845422;
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(132, 84, 34, 0.15);
}

#status {
    margin-top: 30px;
    text-align: left;
    white-space: pre-wrap;
    font-family: monospace;
    font-size: 0.85rem;
    color: #666;
    background: #fcfbfa;
    padding: 15px;
    border-radius: 6px;
    border: 1px solid #eee;
    max-height: 200px;
    overflow-y: auto;
}

#status:empty {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>Annick &amp; Damien</h1>
<div class="wedding-date">Notre Grand Jour</div>

<p>
    Un grand merci d'avoir partagé ces moments avec nous.<br>
    Vous pouvez utiliser le bouton ci-dessous pour nous envoyer les photos et vidéos de notre mariage.
</p>

<input id="photos" type="file" multiple accept="image/*,video/*">

<div class="button-group">
    <button id="uploadBtn" onclick="uploadPhotos()">
        Envoyer nos souvenirs
    </button>
    
    <a href="https://wedding-upload.jkdunbar.workers.dev/gallery" class="btn-secondary">
        Voir la galerie
    </a>
</div>

<div id="status"></div>

</div>

<script>
// Compresses images in the browser to create a fast-loading thumbnail
function createThumbnail(file, maxWidth = 300) {
    return new Promise((resolve) => {
        if (!file.type.startsWith('image/')) {
            // Videos get handled separately or fall back to original
            resolve(null);
            return;
        }

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                } else {
                    if (height > maxWidth) {
                        width = Math.round((width * maxWidth) / height);
                        height = maxWidth;
                    }
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/jpeg', 0.7); // 70% quality is perfect for grid layouts
            };
        };
    });
}

async function uploadPhotos() {
    const fileInput = document.getElementById("photos");
    const files = fileInput.files;
    const btn = document.getElementById("uploadBtn");
    const statusDiv = document.getElementById("status");

    if (files.length === 0) {
        alert("Veuillez sélectionner au moins un fichier.");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Envoi en cours...";
    statusDiv.innerText = "Envoi de vos précieux souvenirs, merci de patienter...";

    let output = "";

    for (const file of files) {
        const formData = new FormData();
        formData.append("file", file);

        // Generate the thumbnail and attach it to the form data
        const thumbBlob = await createThumbnail(file);
        if (thumbBlob) {
            formData.append("thumbnail", thumbBlob, "thumb_" + file.name);
        }

        try {
            const response = await fetch(
                "https://ancient-dew-e0ea.jkdunbar.workers.dev/upload",
                {
                    method: "POST",
                    body: formData
                }
            );

            const text = await response.text();

            output +=
                "FICHIER : " + file.name + "\n" +
                "STATUT : " + response.status + "\n" +
                "RÉPONSE : " + text + "\n\n";

        } catch (err) {
            output +=
                "FICHIER : " + file.name + "\n" +
                "ERREUR : " + err.message + "\n\n";
        }
    }

    statusDiv.innerText = output;
    btn.disabled = false;
    btn.innerText = "Envoyer nos souvenirs";
    fileInput.value = ""; 
}
</script>

</body>
</html>
