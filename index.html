<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annick &amp; Damien's Wedding</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f8f6f2;
        text-align: center;
        margin: 0;
        padding: 20px;
        color: #333;
    }

    .container {
        max-width: 600px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
        color: #8b5e3c;
        margin-bottom: 10px;
    }

    p {
        margin-bottom: 20px;
        line-height: 1.5;
    }

    input[type=file] {
        margin: 20px 0;
        width: 100%;
    }

    button {
        background: #8b5e3c;
        color: white;
        border: none;
        padding: 14px 24px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #6e492e;
    }

    #count {
        margin-top: 10px;
        color: #666;
    }

    #status {
        margin-top: 20px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="container">

    <h1>Annick &amp; Damien's Wedding</h1>

    <p>
        Thank you for celebrating with us.<br>
        Please upload any photos or videos from our special day.
    </p>

    <input
        id="photos"
        type="file"
        multiple
        accept="image/*,video/*"
    >

    <div id="count"></div>

    <button onclick="uploadPhotos()">
        Upload Photos
    </button>

    <div id="status"></div>

</div>

<script>2document.getElementById("photos").addEventListener("change", () => {3    const files = document.getElementById("photos").files;4    document.getElementById("count").innerText =5        files.length + " file(s) selected";6});7 8async function uploadPhotos() {9 10    const files = document.getElementById("photos").files;11 12    if (files.length === 0) {13        alert("Please select photos or videos.");14        return;15    }16 17    const status = document.getElementById("status");18 19    let uploaded = 0;20    let failed = 0;21 22    for (const file of files) {23 24        const formData = new FormData();25        formData.append("file", file);26 27        try {28 29            const response = await fetch("/upload", {30                method: "POST",31                body: formData32            });33 34            const text = await response.text();35 36            console.log("Status:", response.status);37            console.log("Response:", text);38 39            if (response.ok) {40                uploaded++;41            } else {42                failed++;43            }44 45        } catch (error) {46 47            console.error(error);48            failed++;49        }50    }51 52    status.innerHTML =53        "Uploaded: " + uploaded +54        "<br>Failed: " + failed;55}56</script>

</html>
