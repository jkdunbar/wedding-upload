<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mariage d'Annick et Damien</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family: "Segoe UI", Arial, sans-serif;
    min-height:100vh;

    background:
        linear-gradient(
            rgba(255,255,255,0.75),
            rgba(255,255,255,0.75)
        ),
        url("https://lh3.googleusercontent.com/pw/AP1GczPdS-OxgKk0Jy7in-UrHxhB4xjhxMqPwbtApBQNZvKuSDDIBL1Wy5WrZTRT7lve8KXfOOPqYKnf8WtAsBQqaDzoa4HfICr2Dya17sWtK_j0m6IEb_9D=w2400");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:20px;
}

.container{

    width:100%;
    max-width:700px;

    background:rgba(255,255,255,0.92);

    backdrop-filter:blur(6px);

    border-radius:24px;

    padding:40px;

    text-align:center;

    box-shadow:
        0 10px 40px rgba(0,0,0,0.15);
}

h1{
    font-family: Georgia, serif;
    font-size:3rem;
    color:#8b5e3c;
    margin-top:0;
    margin-bottom:10px;
}

.subtitle{
    color:#777;
    font-size:1.2rem;
    margin-bottom:30px;
}

.message{
    font-size:1.1rem;
    line-height:1.6;
    color:#444;
}

input[type=file]{
    width:100%;
    margin:25px 0;
    font-size:16px;
}

button{
    background:#8b5e3c;
    color:white;
    border:none;
    border-radius:12px;
    padding:15px 35px;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#744a2c;
    transform:translateY(-2px);
}

#count{
    color:#666;
    margin-bottom:20px;
}

#status{
    margin-top:25px;
    font-size:18px;
    color:#8b5e3c;
    font-weight:bold;
}

.gallery-link{

    display:inline-block;
    margin-top:20px;

    color:#8b5e3c;
    text-decoration:none;
    font-weight:bold;
}

.gallery-link:hover{
    text-decoration:underline;
}

.footer{
    margin-top:30px;
    color:#888;
    font-size:14px;
}

@media (max-width:600px){

    h1{
        font-size:2.2rem;
    }

    .container{
        padding:25px;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>Annick et Damien</h1>

    <div class="subtitle">
        Notre mariage
    </div>

    <div class="message">
        Merci de célébrer cette journée spéciale avec nous.<br><br>
        Veuillez partager vos photos et vidéos afin que nous puissions profiter de tous les moments de cette magnifique journée.
    </div>

    <input
        id="photos"
        type="file"
        multiple
        accept="image/*,video/*"
    >

    <div id="count"></div>

    <button onclick="uploadPhotos()">
        Téléverser les souvenirs
    </button>

    <div id="status"></div>

    <a class="gallery-link" href="gallery.html">


    <div class="footer">
        Merci de partager vos souvenirs avec nous ❤️
    </div>

</div>

<script>

document.getElementById("photos")
.addEventListener("change", function(){

    const files =
        document.getElementById("photos").files;

    document.getElementById("count").innerText =
        files.length +
        " fichier(s) sélectionné(s)";
});

async function uploadPhotos(){

    const files =
        document.getElementById("photos").files;

    if(files.length === 0){

        alert(
            "Veuillez sélectionner au moins une photo ou une vidéo."
        );

        return;
    }

    const status =
        document.getElementById("status");

    let uploaded = 0;

    for(const file of files){

        status.innerText =
            "Téléversement " +
            (uploaded + 1) +
            " sur " +
            files.length +
            "...";

        const formData =
            new FormData();

        formData.append(
            "file",
            file
        );

        try{

            const response =
                await fetch(
                    "https://ancient-dew-e0ea.jkdunbar.workers.dev/upload",
                    {
                        method:"POST",
                        body:formData
                    }
                );

            if(response.ok){
                uploaded++;
            }

        }catch(err){

            console.error(err);
        }
    }

    status.innerHTML =
        "Merci !<br><br>" +
        uploaded +
        " fichier(s) téléversé(s) avec succès.";

    document.getElementById("photos").value = "";

    document.getElementById("count").innerText = "";
}

</script>

</body>
</html>
