<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Annick &amp; Damien's Wedding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Montserrat', sans-serif;
    background: url('https://lh3.googleusercontent.com/pw/AP1GczM7Vis5mcdviX0334R0lKOI2KNLReNWZqgQQXKKvgUcYpG9iH2W0h5I2i4GwZFwSJkkACzRNykQ9tZpTRPkJp960zBH01Pi9AtFFQJZkXdmD5NGNCf7=w2400') no-repeat center center fixed;
    background-size: cover;
    padding: 60px 20px;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
}

.container {
    max-width: 650px;
    width: 100%;
    margin: auto;
    /* Soft semi-transparent white background for an elegant overlay */
    background: rgba(255, 255, 255, 0.92);
    padding: 50px 40px;
    border-radius: 12px;
    /* Elegant, soft drop shadow */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.5);
}

h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 400;
    color: #845422;
    margin-bottom: 5px;
    letter-spacing: 1px;
}

.wedding-date {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #a37c54;
    font-size: 1.2rem;
    margin-top: 0;
    margin-bottom: 30px;
}

p {
    color: #555555;
    font-size: 0.95rem;
    line-height: 1.8;
    margin-bottom: 30px;
    letter-spacing: 0.5px;
}

/* Elegant custom styling for the file picker */
input[type="file"] {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.9rem;
    color: #777;
    background: #faf8f5;
    padding: 12px 20px;
    border-radius: 6px;
    border: 1px dashed #d1c4b6;
    cursor: pointer;
    width: 80%;
    max-width: 350px;
    box-sizing: border-box;
    transition: all 0.3s ease;
}

input[type="file"]:hover {
    border-color: #845422;
    background: #fdfcfb;
}

button {
    font-family: 'Montserrat', sans-serif;
    background: #845422;
    color: white;
    border: none;
    padding: 14px 40px;
    border-radius: 30px; /* Rounded pill shape for elegance */
    cursor: pointer;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(132, 84, 34, 0.2);
    margin-top: 25px;
}

button:hover {
    background: #6e441a;
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(132, 84, 34, 0.3);
}

button:disabled {
    background: #cccccc;
    box-shadow: none;
    transform: none;
    cursor: not-allowed;
}

#status {
    margin-top: 30px;
    text-align: left;
    white-space: pre-wrap;
    font-family: monospace;
    font-size: 0.85rem;
    color: #666;
    background: #fcfbfa;
    padding: 15px;
    border-radius: 6px;
    border: 1px solid #eee;
    max-height: 200px;
    overflow-y: auto;
}

/* Hide status box if empty */
#status:empty {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>Annick &amp; Damien</h1>
<div class="wedding-date">Our Wedding Day</div>

<p>
    Thank you so much for celebrating with us.<br>
    Please use the button below to share any photos or videos you captured during our special day.
</p>

<input id="photos" type="file" multiple accept="image/*,video/*">

<br>

<button id="uploadBtn" onclick="uploadPhotos()">
    Upload Memories
</button>

<div id="status"></div>
