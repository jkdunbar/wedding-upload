<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annick &amp; Damien's Wedding</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f8f6f2;
    margin: 0;
    padding: 30px;
    color: #333;
}

.container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    text-align: center;
}

h1 {
    color: #9b6433;
}

button {
    background-color: #9b6433;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

#status {
    margin-top: 20px;
    white-space: pre-wrap;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <h1>Annick &amp; Damien's Wedding</h1>

    <p>
        Thank you for celebrating with us.<br>
        Please upload any photos or videos from our special day.
    </p>

    <input id="photos" type="file" multiple accept="image/*,video/*">

    <br><br>

    <button onclick="uploadPhotos()">
        Upload Photos
    </button>

    <div id="status"></div>

</div>

<script>

async function uploadPhotos() {

    const files = document.getElementById("photos").files;

    if(files.length === 0){
        alert("Please select a file");
        return;
    }

    let output = "";

    for(const file of files){

        const formData = new FormData();
        formData.append("file", file);

        try {

            const response = await fetch("/upload", {
                method: "POST",
                body: formData
            });

            const text = await response.text();

            output +=
                file.name +
                "\nHTTP Status: " +
                response.status +
                "\nResponse: " +
                text +
                "\n\n";

        } catch(err){

            output +=
                file.name +
                "\nError: " +
                err.message +
                "\n\n";
        }
    }

    document.getElementById("status").innerText = output;
}

</script>

</body>
</html>
