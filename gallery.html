<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Galerie du mariage d'Annick et Damien</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Montserrat', sans-serif;
    background: url('https://lh3.googleusercontent.com/pw/AP1GczM7Vis5mcdviX0334R0lKOI2KNLReNWZqgQQXKKvgUcYpG9iH2W0h5I2i4GwZFwSJkkACzRNykQ9tZpTRPkJp960zBH01Pi9AtFFQJZkXdmD5NGNCf7=w2400') no-repeat center center fixed;
    background-size: cover;
    margin: 0;
    padding: 40px 20px;
    min-height: 100vh;
    box-sizing: border-box;
}

.container {
    max-width: 1100px;
    margin: auto;
    background: rgba(255, 255, 255, 0.94);
    padding: 50px 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.5);
    position: relative;
}

.gallery-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
    gap: 20px;
    width: 100%;
}

h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 400;
    color: #845422;
    text-align: center;
    margin: 0;
    letter-spacing: 1px;
    line-height: 1.2;
    flex: 1;
}

.btn-secondary {
    font-family: 'Montserrat', sans-serif;
    padding: 12px 28px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-block;
    background: transparent;
    color: #845422;
    border: 1px solid #845422;
    white-space: nowrap;
    flex-shrink: 0;
}

.btn-secondary:hover {
    background: #845422;
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(132, 84, 34, 0.15);
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

.gallery img,
.gallery video,
.heic-placeholder {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
    background-color: #faf8f5;
    box-sizing: border-box;
}

.heic-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 1px dashed #d1c4b6;
    color: #a37c54;
    padding: 20px;
    text-align: center;
}

.heic-placeholder span {
    font-size: 2.5rem;
    margin-bottom: 8px;
}

.heic-placeholder p {
    margin: 0;
    font-size: 0.8rem;
    font-weight: 400;
    line-height: 1.4;
}

.gallery img:hover,
.gallery video:hover,
.heic-placeholder:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 25px rgba(132, 84, 34, 0.15);
}

.viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 12, 10, 0.95);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.viewer-content {
    max-width: 90%;
    max-height: 90%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.viewer-content img,
.viewer-content video,
.viewer-heic-fallback {
    max-width: 100%;
    max-height: 85vh;
    border-radius: 4px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.viewer-heic-fallback {
    background: #ffffff;
    padding: 40px;
    border-radius: 8px;
    text-align: center;
    max-width: 400px;
    font-family: 'Montserrat', sans-serif;
}

.viewer-heic-fallback h3 {
    font-family: 'Cormorant Garamond', serif;
    color: #845422;
    font-size: 1.8rem;
    margin-top: 0;
}

.btn-download {
    display: inline-block;
    margin-top: 20px;
    background: #845422;
    color: #ffffff;
    padding: 12px 24px;
    border-radius: 25px;
    text-decoration: none;
    text-transform: uppercase;
    font-size: 0.8rem;
    letter-spacing: 1px;
    transition: background 0.2s ease;
}

.btn-download:hover {
    background: #6e441a;
}

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    color: #ffffff;
    font-size: 45px;
    font-weight: 300;
    cursor: pointer;
    transition: color 0.2s ease;
}

.close:hover {
    color: #d1c4b6;
}

.loading {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #a37c54;
    font-size: 1.4rem;
    margin-bottom: 20px;
}

.footer {
    text-align: center;
    margin-top: 50px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-style: italic;
    color: #a37c54;
    letter-spacing: 0.5px;
}

@media (min-width: 768px) {
    .gallery-header {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        text-align: left;
    }
    h1 {
        text-align: left;
        padding-right: 20px;
    }
}

@media (max-width: 600px) {
    body { padding: 20px 10px; }
    .container { padding: 30px 20px; }
    h1 { font-size: 1.8rem; }
}
</style>
</head>

<body>

<div class="container">

    <div class="gallery-header">
        <h1>Galerie du mariage d'Annick & Damien</h1>
        <a href="https://wedding-upload.jkdunbar.workers.dev/" class="btn-secondary">
            Ajouter des photos
        </a>
    </div>

    <div id="loading" class="loading">
        Chargement des précieux souvenirs...
    </div>

    <div class="gallery" id="gallery"></div>

    <div class="footer">
        Merci de partager ces merveilleux souvenirs avec nous ❤️
    </div>

</div>

<div class="viewer" id="viewer">
    <span class="close" onclick="closeViewer()">×</span>
    <div class="viewer-content" id="viewerContent"></div>
</div>

<script>
function isVideo(filename){
    const name = filename.toLowerCase();
    return (
        name.endsWith(".mp4") ||
        name.endsWith(".mov") ||
        name.endsWith(".webm") ||
        name.endsWith(".m4v") ||
        name.endsWith(".avi")
    );
}

async function loadGallery(){
    const loading = document.getElementById("loading");

    try {
        const response = await fetch(
            "https://ancient-dew-e0ea.jkdunbar.workers.dev/photos"
        );

        const items = await response.json();
        loading.style.display = "none";

        const gallery = document.getElementById("gallery");
        items.reverse();

        for (const item of items) {
            let element;
            const nameLower = item.name.toLowerCase();

            // Handle the raw non-converted HEIC format cases seamlessly
            if (nameLower.endsWith('.heic')) {
                element = document.createElement("div");
                element.className = "heic-placeholder";
                element.innerHTML = "<span>📷</span><p>Photo Apple HEIC<br><small>(Cliquez pour voir/télécharger)</small></p>";
            } else if (isVideo(item.name)) {
                element = document.createElement("video");
                element.src = item.thumbnailUrl ? item.thumbnailUrl : item.url;
                element.muted = true;
                element.preload = "metadata";
            } else {
                element = document.createElement("img");
                element.src = item.thumbnailUrl ? item.thumbnailUrl : item.url;
                element.loading = "lazy";
            }

            element.onclick = () => {
                const viewerContent = document.getElementById("viewerContent");
                viewerContent.innerHTML = "";

                if (nameLower.endsWith('.heic')) {
                    // Render an elegant fallback box for unconvertable original formats
                    const fallbackBox = document.createElement("div");
                    fallbackBox.className = "viewer-heic-fallback";
                    fallbackBox.innerHTML = `
                        <h3>Photo originale HEIC</h3>
                        <p>Ce format d'image haute efficacité est propre aux appareils Apple et ne peut pas être affiché directement dans ce navigateur.</p>
                        <a href="${item.url}" download="${item.name}" class="btn-download">Télécharger la photo</a>
                    `;
                    viewerContent.appendChild(fallbackBox);
                } else if (isVideo(item.name)) {
                    const video = document.createElement("video");
                    video.src = item.url;
                    video.controls = true;
                    video.autoplay = true;
                    viewerContent.appendChild(video);
                } else {
                    const img = document.createElement("img");
                    img.src = item.url;
                    viewerContent.appendChild(img);
                }

                document.getElementById("viewer").style.display = "flex";
            };

            gallery.appendChild(element);
        }

    } catch (err) {
        loading.innerText = "Impossible de charger la galerie.";
    }
}

function closeViewer(){
    document.getElementById("viewer").style.display = "none";
    document.getElementById("viewerContent").innerHTML = "";
}

document.getElementById("viewer").addEventListener("click", function(e){
    if (e.target.id === "viewer") {
        closeViewer();
    }
});

loadGallery();
</script>

</body>
</html>
