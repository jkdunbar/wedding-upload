<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Galerie du mariage d'Annick et Damien</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f8f6f2;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#9b6433;
}

#loading{
    text-align:center;
    margin:20px;
    font-size:18px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}

.gallery img,
.gallery video{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    cursor:pointer;
}

.viewer{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.viewer img,
.viewer video{
    max-width:95%;
    max-height:95%;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>Galerie du mariage d'Annick et Damien</h1>

<div id="loading">
Chargement...
</div>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">

    <span class="close" onclick="closeViewer()">
        &times;
    </span>

    <div id="viewerContent"></div>

</div>

<script>

function isVideo(filename){

    const name = filename.toLowerCase();

    return (
        name.endsWith(".mp4") ||
        name.endsWith(".mov") ||
        name.endsWith(".webm") ||
        name.endsWith(".m4v") ||
        name.endsWith(".avi")
    );
}

async function loadGallery(){

    const loading =
        document.getElementById("loading");

    try {

        const response = await fetch(
            "https://ancient-dew-e0ea.jkdunbar.workers.dev/photos"
        );

        const items = await response.json();

        loading.innerText =
            items.length + " élément(s) trouvé(s)";

        const gallery =
            document.getElementById(
                "gallery"
            );

        items.reverse();

        for (const item of items){

            let element;

            if (isVideo(item.name)) {

                element =
                    document.createElement(
                        "video"
                    );

                element.src = item.url;
                element.muted = true;
                element.preload = "metadata";

            } else {

                element =
                    document.createElement(
                        "img"
                    );

                element.src = item.url;
            }

            element.onclick = () => {

                const viewerContent =
                    document.getElementById(
                        "viewerContent"
                    );

                viewerContent.innerHTML = "";

                if (isVideo(item.name)) {

                    const video =
                        document.createElement(
                            "video"
                        );

                    video.src = item.url;
                    video.controls = true;
                    video.autoplay = true;

                    viewerContent.appendChild(
                        video
                    );

                } else {

                    const img =
                        document.createElement(
                            "img"
                        );

                    img.src = item.url;

                    viewerContent.appendChild(
                        img
                    );
                }

                document.getElementById(
                    "viewer"
                ).style.display = "flex";
            };

            gallery.appendChild(element);
        }

    } catch(err) {

        loading.innerText =
            "Erreur : " + err.message;
    }
}

function closeViewer(){

    document.getElementById(
        "viewer"
    ).style.display = "none";

    document.getElementById(
        "viewerContent"
    ).innerHTML = "";
}

loadGallery();

</script>

</body>
</html>
