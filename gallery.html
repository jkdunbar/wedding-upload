<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Galerie du mariage d'Annick et Damien</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f8f6f2;
    margin: 0;
    padding: 20px;
}

.container{
    max-width: 1200px;
    margin: auto;
}

h1{
    text-align: center;
    color: #9b6433;
    margin-bottom: 30px;
}

.gallery{
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
    gap: 15px;
}

.gallery img{
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(0,0,0,.15);
    transition: transform .2s;
}

.gallery img:hover{
    transform: scale(1.03);
}

.viewer{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.9);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.viewer img{
    max-width: 95%;
    max-height: 95%;
}

.close{
    position: absolute;
    top: 15px;
    right: 30px;
    color: white;
    font-size: 40px;
    cursor: pointer;
}

.loading{
    text-align: center;
    color: #9b6433;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

    <h1>Galerie du mariage d'Annick et Damien</h1>

    <div id="loading" class="loading">
        Chargement des photos...
    </div>

    <div class="gallery" id="gallery"></div>

</div>

<div class="viewer" id="viewer">

    <span class="close" onclick="closeViewer()">
        &times;
    </span>

    <img id="viewerImage">

</div>

<script>

async function loadGallery() {

    try {

        const response = await fetch(
            "https://ancient-dew-e0ea.jkdunbar.workers.dev/photos"
        );

        const photos = await response.json();

        const gallery =
            document.getElementById("gallery");

        document.getElementById(
            "loading"
        ).style.display = "none";

        photos.reverse();

        for (const photo of photos) {

            const img =
                document.createElement("img");

            img.src = photo.url;
            img.loading = "lazy";

            img.onclick = () => {

                document.getElementById(
                    "viewerImage"
                ).src = photo.url;

                document.getElementById(
                    "viewer"
                ).style.display = "flex";
            };

            gallery.appendChild(img);
        }

    } catch (err) {

        document.getElementById(
            "loading"
        ).innerText =
            "Impossible de charger la galerie.";
    }
}

function closeViewer() {

    document.getElementById(
        "viewer"
    ).style.display = "none";
}

document.getElementById("viewer")
    .addEventListener("click", function(e){

    if(e.target.id === "viewer"){
        closeViewer();
    }
});

loadGallery();

</script>

</body>
</html>
