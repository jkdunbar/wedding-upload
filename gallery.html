<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Galerie du mariage d'Annick et Damien</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Montserrat', sans-serif;
    background: url('https://lh3.googleusercontent.com/pw/AP1GczM7Vis5mcdviX0334R0lKOI2KNLReNWZqgQQXKKvgUcYpG9iH2W0h5I2i4GwZFwSJkkACzRNykQ9tZpTRPkJp960zBH01Pi9AtFFQJZkXdmD5NGNCf7=w2400') no-repeat center center fixed;
    background-size: cover;
    margin: 0;
    padding: 40px 20px;
    min-height: 100vh;
    box-sizing: border-box;
}

.container {
    max-width: 1100px;
    margin: auto;
    background: rgba(255, 255, 255, 0.94);
    padding: 50px 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.5);
    position: relative;
}

/* Header layout to support button positioning */
.gallery-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
    gap: 15px;
}

h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 400;
    color: #845422;
    text-align: center;
    margin: 0;
    letter-spacing: 1px;
}

/* Elegant Action Button back to Upload Page */
.btn-secondary {
    font-family: 'Montserrat', sans-serif;
    padding: 10px 24px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-block;
    background: transparent;
    color: #845422;
    border: 1px solid #845422;
}

.btn-secondary:hover {
    background: #845422;
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(132, 84, 34, 0.15);
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

.gallery img,
.gallery video {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
    background-color: #faf8f5;
}

.gallery img:hover,
.gallery video:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 25px rgba(132, 84, 34, 0.15);
}

.viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 12, 10, 0.95);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.viewer-content {
    max-width: 90%;
    max-height: 90%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.viewer-content img,
.viewer-content video {
    max-width: 100%;
    max-height: 85vh;
    border-radius: 4px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    color: #ffffff;
    font-size: 45px;
    font-weight: 300;
    cursor: pointer;
    transition: color 0.2s ease;
}

.close:hover {
    color: #d1c4b6;
}

.loading {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #a37c54;
    font-size: 1.4rem;
    margin-bottom: 20px;
}

.footer {
    text-align: center;
    margin-top: 50px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-style: italic;
    color: #a37c54;
    letter-spacing: 0.5px;
}

/* Desktop layout adjustment for the header */
@media (min-width: 768px) {
    .gallery-header {
        flex-direction: row;
        justify-content: space-between;
    }
    h1 {
        text-align: left;
    }
}

@media (max-width: 600px) {
    body { padding: 20px 10px; }
    .container { padding: 30px 20px; }
    h1 { font-size: 1.8rem; }
}
</style>
</head>
