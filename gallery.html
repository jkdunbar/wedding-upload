<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Galerie du mariage d'Annick et Damien</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f8f6f2;
    margin: 0;
    padding: 20px;
}

.container{
    max-width: 1200px;
    margin: auto;
}

h1{
    text-align: center;
    color: #9b6433;
    margin-bottom: 30px;
}

.gallery{
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
    gap: 15px;
}

.gallery img,
.gallery video{
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(0,0,0,.15);
}

.viewer{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.95);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.viewer-content{
    max-width: 95%;
    max-height: 95%;
}

.viewer-content img,
.viewer-content video{
    max-width: 100%;
    max-height: 90vh;
}

.close{
    position: absolute;
    top: 15px;
    right: 30px;
    color: white;
    font-size: 40px;
    cursor: pointer;
}

.loading{
    text-align: center;
    color: #9b6433;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

    <h1>Galerie du mariage d'Annick et Damien</h1>

    <div id="loading" class="loading">
        Chargement des souvenirs...
    </div>

    <div class="gallery" id="gallery"></div>

</div>

<div class="viewer" id="viewer">

    <span class="close" onclick="closeViewer()">
        &times;
    </span>

    <div class="viewer-content" id="viewerContent"></div>

</div>
